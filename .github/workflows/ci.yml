name: CI - 持续集成

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'SmartAM_System/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'SmartAM_System/**'

jobs:
  # 后端测试
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SmartAM_System/backend
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 缓存 pip 依赖
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-asyncio black isort
        pip install -r requirements.txt
    
    - name: 代码格式检查 (black)
      run: |
        black --check --diff .
      continue-on-error: true
    
    - name: 导入排序检查 (isort)
      run: |
        isort --check-only --diff .
      continue-on-error: true
    
    - name: 代码风格检查 (flake8)
      run: |
        # 停止在第一个错误，显示统计信息
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # 警告级别检查
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: 运行单元测试
      run: |
        pytest tests/ -v --tb=short --cov=. --cov-report=xml
    
    - name: 上传覆盖率报告
      uses: codecov/codecov-action@v3
      with:
        file: ./SmartAM_System/backend/coverage.xml
        flags: backend
        name: backend-python${{ matrix.python-version }}

  # 后端类型检查
  backend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SmartAM_System/backend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        pip install mypy types-requests
        pip install -r requirements.txt
    
    - name: 类型检查 (mypy)
      run: |
        mypy core/ api/ --ignore-missing-imports --show-error-codes
      continue-on-error: true

  # 前端测试
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SmartAM_System/frontend
    
    strategy:
      matrix:
        node-version: ['18.x', '20.x']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: SmartAM_System/frontend/package-lock.json
    
    - name: 安装依赖
      run: npm ci
    
    - name: 代码格式检查 (ESLint)
      run: npm run lint
      continue-on-error: true
    
    - name: 运行单元测试
      run: npm run test:unit -- --run
    
    - name: 构建生产版本
      run: npm run build

  # Docker 构建测试
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 构建后端镜像
      uses: docker/build-push-action@v5
      with:
        context: SmartAM_System/backend
        push: false
        tags: smartam-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: 构建前端镜像
      uses: docker/build-push-action@v5
      with:
        context: SmartAM_System/frontend
        push: false
        tags: smartam-frontend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 安全检查
  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 运行 Trivy 漏洞扫描
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'SmartAM_System'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: 上传扫描结果
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
